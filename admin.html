<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilu Admin Area</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C9A84C; --bg: #060606; --box: #141414; --border: rgba(255,255,255,0.1); --text: #F0EDE8; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;}
        
        .box { background: var(--box); padding: 30px; border-radius: 14px; border: 1px solid var(--border); width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        h1 { color: var(--gold); margin-top: 0; letter-spacing: 2px; text-transform: uppercase; font-size: 24px; text-align: center; }
        h2 { color: #fff; font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        
        input, select, button, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-family: inherit; box-sizing: border-box; }
        input[type="file"] { background: #222; padding: 10px; cursor: pointer; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        
        .admin-item { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .admin-item img, .admin-item video { max-width: 100%; border-radius: 6px; }
        .btn-del { background: #ff3b30; color: white; margin-bottom: 0; }
        .btn-update { background: #43E660; color: #000; margin-bottom: 0; }
        
        .analytics-panel { border: 1px solid var(--gold); background: #0d0d0d; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        .news-list { max-height: 200px; overflow-y: auto; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
        .news-item { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; display: flex; align-items: center; gap: 10px; color: #ccc;}
        .news-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h1>Area Riservata Pilu</h1>
    <input type="password" id="password" placeholder="Password Admin">
    <button id="btn-login">Accedi</button>
    <div id="login-error" style="color: #ff3b30; margin-top: 10px; display: none; font-size: 14px;">Password errata. Riprova.</div>
</div>

<div id="admin-box" class="box hidden">
    <h1>Pannello DJ Pilu</h1>
    <button id="btn-logout" style="background: #333; color: white; margin-bottom: 30px;">Esci</button>

    <div class="box analytics-panel" style="padding: 20px; width: auto; max-width: none; margin: 0 -10px 30px -10px;">
        <h2 style="color: var(--gold); border-bottom-color: var(--gold);"><i class="fas fa-chart-line"></i> Statistiche</h2>
        
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-num" id="stat-views">0</div>
                <div class="stat-label"><i class="fas fa-eye"></i> Visite Totali</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-likes" style="color: #ff5050;">0</div>
                <div class="stat-label"><i class="fas fa-heart"></i> Mi Piace</div>
            </div>
        </div>
        
        <div class="stat-box" style="margin-bottom: 20px; border-color: var(--gold);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span class="stat-label" style="color:var(--gold);">Tempo di Permanenza</span>
                <select id="day-selector" style="width: auto; padding: 5px; margin: 0; background: #222; border: 1px solid var(--gold);"></select>
            </div>
            <div class="stat-num" id="stat-time" style="color: #43E660; font-size: 26px;">0h 0m</div>
        </div>

        <h2><i class="fas fa-envelope"></i> Iscritti Newsletter</h2>
        <div id="news-container" class="news-list"></div>
    </div>

    <h2><i class="fas fa-calendar-alt"></i> Aggiungi Locandina</h2>
    <input type="file" id="ev-file" accept="image/*">
    <input type="datetime-local" id="ev-date">
    <button id="btn-add-ev">Carica Evento</button>
    <div id="upload-status-ev" style="margin-top:10px; color:#43E660; font-size:14px;"></div>
    <div id="events-container" style="margin-top: 20px;"></div>

    <h2 style="margin-top: 40px;"><i class="fas fa-camera"></i> Aggiungi a Vibes (Gallery)</h2>
    <select id="gal-type">
        <option value="image">Immagine</option>
        <option value="video">Video (MP4)</option>
    </select>
    <input type="file" id="gal-file" accept="image/*,video/mp4">
    <input type="number" id="gal-order" placeholder="Ordine (es. 1, 2, 3...)" value="1">
    <button id="btn-add-gal">Carica Media</button>
    <div id="upload-status-gal" style="margin-top:10px; color:#43E660; font-size:14px;"></div>
    <div id="gallery-container" style="margin-top: 20px;"></div>

    <h2 style="margin-top: 40px;"><i class="fas fa-star"></i> Gestisci Recensioni</h2>
    <div id="reviews-container" style="margin-top: 20px;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, getDoc, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyDPAwh58NCFJ3CoTLvG8KcVXC5oQPIzXiI",
    authDomain: "sito-pilu.firebaseapp.com",
    projectId: "sito-pilu",
    storageBucket: "sito-pilu.firebasestorage.app",
    messagingSenderId: "423213362317",
    appId: "1:423213362317:web:809d1124411a6f3023c6c4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let dailyStatsData = {};

document.getElementById('btn-login').addEventListener('click', () => {
    if(document.getElementById('password').value === "118") {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('admin-box').classList.remove('hidden');
        loadAllData();
    } else {
        document.getElementById('login-error').style.display = 'block';
    }
});

document.getElementById('btn-logout').addEventListener('click', () => location.reload());

function loadAllData() {
    loadAnalytics();
    loadAdminEvents();
    loadAdminGallery();
    loadAdminReviews();
}

async function loadAnalytics() {
    // Views globali
    const snap = await getDoc(doc(db, "stats", "global"));
    if (snap.exists()) {
        document.getElementById('stat-views').innerText = snap.data().views || 0;
        document.getElementById('stat-likes').innerText = snap.data().likes || 0;
    }

    // Tempo giornaliero
    const daySnap = await getDocs(collection(db, "stats_daily"));
    const selector = document.getElementById('day-selector');
    selector.innerHTML = '';
    dailyStatsData = {};

    if(daySnap.empty) {
        selector.innerHTML = '<option>Nessun dato</option>';
    } else {
        daySnap.forEach(d => {
            dailyStatsData[d.id] = d.data().totalTimeSec || 0;
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.innerText = d.id; // Mostra YYYY-MM-DD
            selector.appendChild(opt);
        });
        
        // Seleziona l'ultimo giorno per default
        selector.selectedIndex = selector.options.length - 1;
        aggiornaTempoVisualizzato();
    }

    // Iscritti
    const newsSnap = await getDocs(query(collection(db, "newsletter"), orderBy("dataIscrizione", "desc")));
    document.getElementById('news-container').innerHTML = "";
    newsSnap.forEach(d => {
        const data = d.data();
        const dateStr = data.dataIscrizione ? new Date(data.dataIscrizione.toDate()).toLocaleDateString('it-IT') : '';
        document.getElementById('news-container').innerHTML += `<div class="news-item"><i class="fas fa-bell" style="color:var(--gold)"></i> <strong>${data.contatto}</strong> <span style="font-size:11px; margin-left:auto;">${dateStr}</span></div>`;
    });
}

function aggiornaTempoVisualizzato() {
    const selectedDate = document.getElementById('day-selector').value;
    const totalSec = dailyStatsData[selectedDate] || 0;
    const ore = Math.floor(totalSec / 3600);
    const minuti = Math.floor((totalSec % 3600) / 60);
    document.getElementById('stat-time').innerText = `${ore}h ${minuti}m`;
}
document.getElementById('day-selector').addEventListener('change', aggiornaTempoVisualizzato);

// CARICAMENTO EVENTI CON STORAGE
document.getElementById('btn-add-ev').addEventListener('click', async () => {
    const fileInput = document.getElementById('ev-file');
    const date = document.getElementById('ev-date').value;
    const status = document.getElementById('upload-status-ev');

    if(fileInput.files.length === 0 || !date) return alert("Seleziona un'immagine e una data!");
    
    const file = fileInput.files[0];
    document.getElementById('btn-add-ev').innerText = "Caricamento...";
    status.innerText = "Upload immagine in corso...";

    try {
        const fileRef = ref(storage, 'eventi/' + Date.now() + '_' + file.name);
        await uploadBytes(fileRef, file);
        const downloadURL = await getDownloadURL(fileRef);

        await addDoc(collection(db, "eventi"), { img: downloadURL, date: date + ":00" });
        status.innerText = "Locandina caricata con successo!";
        fileInput.value = ""; document.getElementById('ev-date').value = "";
        loadAdminEvents();
    } catch(e) {
        status.innerText = "Errore durante l'upload!"; console.error(e);
    }
    document.getElementById('btn-add-ev').innerText = "Carica Evento";
    setTimeout(() => status.innerText="", 4000);
});

async function loadAdminEvents() {
    const c = document.getElementById('events-container'); c.innerHTML = "";
    const snap = await getDocs(query(collection(db, "eventi"), orderBy("date", "asc")));
    snap.forEach(d => {
        c.innerHTML += `<div class="admin-item"><img src="${d.data().img}"><input type="datetime-local" id="date-${d.id}" value="${d.data().date.substring(0,16)}"><button class="btn-update" onclick="aggiornaData('${d.id}')">Aggiorna Data</button><button class="btn-del" onclick="eliminaDoc('eventi', '${d.id}')"><i class="fas fa-trash"></i> Elimina</button></div>`;
    });
}

// CARICAMENTO GALLERY CON STORAGE
document.getElementById('btn-add-gal').addEventListener('click', async () => {
    const fileInput = document.getElementById('gal-file');
    const type = document.getElementById('gal-type').value;
    const order = parseInt(document.getElementById('gal-order').value);
    const status = document.getElementById('upload-status-gal');

    if(fileInput.files.length === 0) return alert("Seleziona un file!");
    
    const file = fileInput.files[0];
    document.getElementById('btn-add-gal').innerText = "Caricamento...";
    status.innerText = "Upload media in corso... attendi.";

    try {
        const fileRef = ref(storage, 'gallery/' + Date.now() + '_' + file.name);
        await uploadBytes(fileRef, file);
        const downloadURL = await getDownloadURL(fileRef);

        await addDoc(collection(db,
